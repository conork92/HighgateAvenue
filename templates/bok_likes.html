<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Bok Likes – Highgate Avenue</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=20260209">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar.css') }}?v=20260207">
    <style>
        .bok-likes-page { padding: 1rem 0; max-width: 420px; margin: 0 auto; min-height: 70vh; display: flex; flex-direction: column; }
        .bok-likes-page h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
        .bok-likes-page .subtitle { color: var(--gray-dark, #666); font-size: 0.875rem; margin-bottom: 1rem; }
        .bok-likes-stack { position: relative; flex: 1; min-height: 380px; touch-action: pan-y; }
        .bok-likes-card {
            position: absolute;
            left: 50%;
            top: 0;
            width: 100%;
            max-width: 340px;
            margin-left: -170px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            overflow: hidden;
            transition: transform 0.2s ease-out, opacity 0.2s ease-out;
            cursor: grab;
            user-select: none;
        }
        .bok-likes-card:active { cursor: grabbing; }
        .bok-likes-card.swiping { transition: none; }
        .bok-likes-card .card-link { display: block; text-decoration: none; color: inherit; }
        .bok-likes-card .card-image-wrap {
            aspect-ratio: 1;
            background: #f0f0f0;
            position: relative;
            overflow: hidden;
        }
        .bok-likes-card .card-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .bok-likes-card .card-image-wrap .card-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 0.875rem;
        }
        .bok-likes-card .card-info { padding: 1rem; }
        .bok-likes-card .card-title { font-weight: 600; font-size: 1rem; margin-bottom: 0.25rem; line-height: 1.3; }
        .bok-likes-card .card-price { font-size: 0.9rem; color: var(--gray-dark, #555); }
        .bok-likes-card .card-website { font-size: 0.75rem; color: #888; margin-top: 0.25rem; }
        .bok-likes-actions {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 1.5rem 0;
            flex-shrink: 0;
        }
        .bok-likes-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid #ddd;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: transform 0.15s, border-color 0.15s, background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .bok-likes-btn:active { transform: scale(0.95); }
        .bok-likes-btn-pass { color: #c00; }
        .bok-likes-btn-pass:hover, .bok-likes-btn-pass:focus { border-color: #c00; background: #fff5f5; }
        .bok-likes-btn-like { color: #0a0; }
        .bok-likes-btn-like:hover, .bok-likes-btn-like:focus { border-color: #0a0; background: #f0fff0; }
        .bok-likes-empty, .bok-likes-loading { text-align: center; padding: 2rem; color: var(--gray-dark, #666); }
        .bok-likes-empty { display: none; }
        .bok-likes-empty.visible { display: block; }
        .bok-likes-loading.hidden { display: none; }
        .bok-likes-feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: 700;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
            z-index: 5;
        }
        .bok-likes-card .bok-likes-feedback-like { color: #0a0; text-shadow: 0 0 8px #fff; }
        .bok-likes-card .bok-likes-feedback-pass { color: #c00; text-shadow: 0 0 8px #fff; }
        .bok-likes-card.show-pass .bok-likes-feedback-pass,
        .bok-likes-card.show-like .bok-likes-feedback-like { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="app-layout">
        {% include '_sidebar.html' %}
        <main class="main-with-sidebar">
            <div class="container">
                <div class="bok-likes-page">
                    <header>
                        <h1>Bok Likes</h1>
                        <p class="subtitle">Swipe right to like, left to pass. Products you haven’t decided on yet.</p>
                    </header>
                    <div id="bokLikesLoading" class="bok-likes-loading">Loading…</div>
                    <div id="bokLikesEmpty" class="bok-likes-empty">No products to review. All products have been liked or passed.</div>
                    <div id="bokLikesStack" class="bok-likes-stack" style="display: none;"></div>
                    <div id="bokLikesActions" class="bok-likes-actions" style="display: none;">
                        <button type="button" class="bok-likes-btn bok-likes-btn-pass" id="bokLikesBtnPass" aria-label="Pass">✕</button>
                        <button type="button" class="bok-likes-btn bok-likes-btn-like" id="bokLikesBtnLike" aria-label="Like">♥</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
(function() {
    var stackEl = document.getElementById('bokLikesStack');
    var loadingEl = document.getElementById('bokLikesLoading');
    var emptyEl = document.getElementById('bokLikesEmpty');
    var actionsEl = document.getElementById('bokLikesActions');
    var btnPass = document.getElementById('bokLikesBtnPass');
    var btnLike = document.getElementById('bokLikesBtnLike');

    var products = [];
    var currentIndex = 0;
    var touchStartX = 0, touchStartY = 0, cardStartX = 0;
    var SWIPE_THRESHOLD = 80;
    var currentCardEl = null;

    function escapeHtml(s) {
        if (s == null || s === undefined) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function getWebsiteDisplay(p) {
        var w = (p && p.website_name && p.website_name.trim()) ? p.website_name.trim() : (p && p.link ? new URL(p.link).hostname.replace(/^www\./, '') : '');
        return w || '(No website)';
    }

    function buildCard(product, isTop) {
        var p = product;
        var imgUrl = (p.image_url && p.image_url.trim()) ? p.image_url.trim() : '';
        var imgHtml = imgUrl
            ? '<img src="' + escapeHtml(imgUrl) + '" alt="" loading="lazy">'
            : '<span class="card-placeholder">No image</span>';
        var title = (p.title && p.title.trim()) ? p.title.trim() : 'Untitled';
        var price = (p.price && p.price.trim()) ? p.price.trim() : '';
        var priceDisplay = price && !price.startsWith('£') ? '£ ' + price : price;
        var link = (p.link && p.link.trim()) ? p.link : '#';
        var website = getWebsiteDisplay(p);
        var card = document.createElement('div');
        card.className = 'bok-likes-card' + (isTop ? ' top' : '');
        card.dataset.productId = p.id;
        card.innerHTML =
            '<a href="' + escapeHtml(link) + '" target="_blank" rel="noopener noreferrer" class="card-link">' +
            '  <div class="card-image-wrap">' + imgHtml + '</div>' +
            '  <div class="card-info">' +
            '    <div class="card-title">' + escapeHtml(title) + '</div>' +
            (priceDisplay ? '<div class="card-price">' + escapeHtml(priceDisplay) + '</div>' : '') +
            (website && website !== '(No website)' ? '<div class="card-website">' + escapeHtml(website) + '</div>' : '') +
            '  </div>' +
            '</a>' +
            '<span class="bok-likes-feedback bok-likes-feedback-pass" aria-hidden="true">✕</span>' +
            '<span class="bok-likes-feedback bok-likes-feedback-like" aria-hidden="true">♥</span>';
        return card;
    }

    function renderStack() {
        stackEl.innerHTML = '';
        if (products.length === 0) {
            loadingEl.classList.add('hidden');
            emptyEl.classList.add('visible');
            actionsEl.style.display = 'none';
            stackEl.style.display = 'none';
            return;
        }
        loadingEl.classList.add('hidden');
        emptyEl.classList.remove('visible');
        actionsEl.style.display = 'flex';
        stackEl.style.display = 'block';
        // Show up to 3 cards stacked (next behind current)
        var show = Math.min(3, products.length - currentIndex);
        for (var i = 0; i < show; i++) {
            var idx = currentIndex + i;
            var product = products[idx];
            var card = buildCard(product, i === 0);
            card.style.zIndex = 10 - i;
            card.style.transform = 'translateX(-50%) scale(' + (1 - i * 0.04) + ')';
            if (i === 0) {
                currentCardEl = card;
                bindSwipe(card, product);
            }
            stackEl.appendChild(card);
        }
    }

    function bindSwipe(cardEl, product) {
        var productId = product.id;
        var startX = 0, startY = 0, startTx = 0;

        function onStart(clientX, clientY) {
            startX = clientX;
            startY = clientY;
            startTx = 0;
            cardEl.classList.add('swiping');
        }
        function onMove(clientX, clientY) {
            var dx = clientX - startX;
            var dy = clientY - startY;
            if (startTx === 0 && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) startTx = dx;
            var tx = clientX - startX;
            cardEl.style.transform = 'translateX(calc(-50% + ' + tx + 'px))';
            cardEl.classList.remove('show-like', 'show-pass');
            if (tx > SWIPE_THRESHOLD) cardEl.classList.add('show-like');
            else if (tx < -SWIPE_THRESHOLD) cardEl.classList.add('show-pass');
        }
        function onEnd(clientX) {
            cardEl.classList.remove('swiping');
            var dx = clientX - startX;
            if (dx > SWIPE_THRESHOLD) { setBokLikes(productId, true); return; }
            if (dx < -SWIPE_THRESHOLD) { setBokLikes(productId, false); return; }
            cardEl.style.transform = 'translateX(-50%) scale(1)';
            cardEl.classList.remove('show-like', 'show-pass');
        }

        cardEl.addEventListener('touchstart', function(e) {
            onStart(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });
        cardEl.addEventListener('touchmove', function(e) {
            if (cardEl.classList.contains('swiping')) {
                e.preventDefault();
                onMove(e.touches[0].clientX, e.touches[0].clientY);
            } else {
                var dx = Math.abs(e.touches[0].clientX - startX);
                if (dx > 10) {
                    cardEl.classList.add('swiping');
                    e.preventDefault();
                    onMove(e.touches[0].clientX, e.touches[0].clientY);
                }
            }
        }, { passive: false });
        cardEl.addEventListener('touchend', function(e) {
            if (!cardEl.classList.contains('swiping')) return;
            var endX = e.changedTouches[0] ? e.changedTouches[0].clientX : startX;
            onEnd(endX);
        });

        cardEl.addEventListener('mousedown', function(e) {
            if (e.button !== 0) return;
            onStart(e.clientX, e.clientY);
            function mmove(ee) {
                if (!cardEl.classList.contains('swiping')) {
                    var dx = Math.abs(ee.clientX - startX);
                    if (dx > 10) cardEl.classList.add('swiping');
                }
                if (cardEl.classList.contains('swiping')) onMove(ee.clientX, ee.clientY);
            }
            function mend(ee) {
                document.removeEventListener('mousemove', mmove);
                document.removeEventListener('mouseup', mend);
                if (cardEl.classList.contains('swiping')) onEnd(ee.clientX);
            }
            document.addEventListener('mousemove', mmove);
            document.addEventListener('mouseup', mend);
        });

        cardEl.querySelector('.card-link').addEventListener('click', function(e) {
            if (cardEl.classList.contains('swiping')) e.preventDefault();
        });
    }

    function setBokLikes(productId, liked) {
        fetch('/api/products/' + productId, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ bok_likes: liked })
        }).then(function() {
            // Remove from local list and advance
            products = products.filter(function(p) { return p.id !== productId; });
            currentIndex = 0;
            renderStack();
        }).catch(function() {
            if (currentCardEl) {
                currentCardEl.style.transform = 'translateX(-50%) scale(1)';
                currentCardEl.classList.remove('show-like', 'show-pass');
            }
        });
    }

    function passCurrent() {
        var top = products[currentIndex];
        if (top) setBokLikes(top.id, false);
    }
    function likeCurrent() {
        var top = products[currentIndex];
        if (top) setBokLikes(top.id, true);
    }

    btnPass.addEventListener('click', passCurrent);
    btnLike.addEventListener('click', likeCurrent);

    fetch('/api/products/bok-likes-pending')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            products = Array.isArray(data) ? data : (data && data.data ? data.data : []);
            currentIndex = 0;
            renderStack();
        })
        .catch(function() {
            loadingEl.textContent = 'Failed to load.';
        });
})();
    </script>
</body>
</html>
