<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Highgate Avenue - Muswell Hill {{ room_label }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=20260207">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar.css') }}?v=20260207">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/room-blocky.css') }}?v=20260207">
</head>
<body class="room-page--blocky">
    <div class="app-layout">
        {% include '_sidebar.html' %}
        <main class="main-with-sidebar">
            <div class="room-page__container" data-room-blocky="true">
                <header class="room-hero">
                    <h1>Muswell Hill – {{ room_label }}</h1>
                    <p class="room-hero__sub">Photos & ideas</p>
                </header>
                <div class="room-content">
                    <section class="room-section">
                        <h2 class="room-section__title">Photos</h2>
                        <div id="muswellLoading" class="loading">Loading images...</div>
                        <div id="muswellError" class="error" style="display: none;"></div>
                        <div id="muswellGrid" class="room-grid" style="display: none;"></div>
                        <p id="muswellEmpty" class="room-ideas-empty" style="display: none;">No images in this folder yet. Add images to <code>gs://highgate-avenue-designs/{{ bucket_prefix }}/</code> to see them here.</p>
                    </section>
                    <section class="room-section">
                        <h2 class="room-section__title">Pinterest board</h2>
                        <div id="pinterestBlock" class="room-block">
                            <p id="pinterestLinkWrap" style="display: none; margin-bottom: 0.5rem;"><a id="pinterestLink" href="#" target="_blank" rel="noopener" class="room-block__link">Open Pinterest board →</a></p>
                            <div class="room-block__row">
                                <input type="url" id="pinterestBoardUrl" placeholder="https://uk.pinterest.com/..." aria-label="Pinterest board URL">
                                <button type="button" id="pinterestSave" class="room-btn">Save board</button>
                            </div>
                            <p id="pinterestMsg" style="margin-top: 0.5rem; font-size: 0.85rem; color: #666;"></p>
                        </div>
                    </section>
                    <section class="room-section">
                        <h2 class="room-section__title">Ideas & notes</h2>
                        <form id="ideaForm" class="room-block" style="margin-bottom: 1rem;">
                            <input type="hidden" name="room" value="{{ room_slug }}">
                            <div class="room-field">
                                <label for="ideaText" class="room-label">Idea</label>
                                <textarea id="ideaText" name="idea" rows="2" placeholder="e.g. Drawers that can pull out"></textarea>
                            </div>
                            <div class="room-field">
                                <label for="ideaImageUrl" class="room-label">Image link (optional)</label>
                                <input type="url" id="ideaImageUrl" name="image_url" placeholder="https://...">
                            </div>
                            <div class="room-field">
                                <label for="ideaTags" class="room-label">Tags (comma-separated)</label>
                                <input type="text" id="ideaTags" name="tags" placeholder="storage, drawers">
                            </div>
                            <button type="submit" class="room-btn">Add idea</button>
                        </form>
                        <div id="ideasList" class="room-ideas-list"></div>
                    </section>
                    <section class="room-section" id="roomProductsSection">
                        <h2 class="room-section__title">Products</h2>
                        <div id="roomProductsList" class="room-products-list"></div>
                    </section>
                </div>
            </div>
        </main>
    </div>
    <script>
        (function() {
            const roomSlug = {{ room_slug | tojson }};
            const fallbackImages = {{ fallback_images | tojson }};
            const loading = document.getElementById('muswellLoading');
            const errDiv = document.getElementById('muswellError');
            const grid = document.getElementById('muswellGrid');
            const empty = document.getElementById('muswellEmpty');
            function escapeHtml(s) {
                var div = document.createElement('div');
                div.textContent = s;
                return div.innerHTML;
            }
            function renderImages(images) {
                if (!images || images.length === 0) return;
                grid.style.display = 'grid';
                grid.innerHTML = images.map(function(img) {
                    return '<div class="room-card"><a href="' + escapeHtml(img.url) + '" target="_blank" rel="noopener">' +
                        '<img src="' + escapeHtml(img.url) + '" alt="' + escapeHtml(img.name || '') + '" class="room-card__img" loading="lazy" onerror="this.style.display=\'none\'">' +
                        '<div class="room-card__cap">' + escapeHtml(img.name || '') + '</div></a></div>';
                }).join('');
            }
            fetch('/api/muswell-hill-images/' + roomSlug)
                .then(r => r.json())
                .then(images => {
                    loading.style.display = 'none';
                    if (images && images.length > 0) {
                        renderImages(images);
                        return;
                    }
                    if (fallbackImages && fallbackImages.length > 0) {
                        renderImages(fallbackImages);
                        return;
                    }
                    empty.style.display = 'block';
                })
                .catch(e => {
                    loading.style.display = 'none';
                    if (fallbackImages && fallbackImages.length > 0) {
                        renderImages(fallbackImages);
                    } else {
                        errDiv.style.display = 'block';
                        errDiv.textContent = 'Failed to load images.';
                    }
                });
        })();

        // Room products
        (function() {
            const list = document.getElementById('roomProductsList');
            if (!list) return;
            const roomSlug = {{ room_slug | tojson }};
            function esc(s) {
                var d = document.createElement('div');
                d.textContent = s == null ? '' : s;
                return d.innerHTML;
            }
            fetch('/api/muswell-hill-products?room=' + encodeURIComponent(roomSlug))
                .then(r => r.json())
                .then(function(products) {
                    if (!products || products.length === 0) {
                        list.innerHTML = '<p class="room-ideas-empty">No products linked to this room yet. <a href="/muswell-hill/products/">Add products</a> and set their room to see them here.</p>';
                        return;
                    }
                    list.innerHTML = products.map(function(p) {
                        var link = (p.link || '').trim() || '#';
                        var img = (p.image_url || '').trim();
                        var imgHtml = img ? '<img src="' + esc(img) + '" alt="" class="room-product-card__img" loading="lazy" onerror="this.style.display=\'none\'">' : '<div class="room-product-card__noimg">No image</div>';
                        var price = (p.price || '').trim() ? '<span class="room-product-card__price">' + esc(p.price) + '</span>' : '';
                        var cat = (p.category || '').trim() ? '<span class="room-product-card__cat">' + esc(p.category) + '</span>' : '';
                        return '<a href="' + esc(link) + '" target="_blank" rel="noopener" class="room-product-card">' +
                            '<div class="room-product-card__img-wrap">' + imgHtml + '</div>' +
                            '<div class="room-product-card__cap">' +
                            '<span class="room-product-card__title">' + esc(p.title || 'Untitled') + '</span>' +
                            (price || cat ? '<span class="room-product-card__meta">' + price + (price && cat ? ' · ' : '') + cat + '</span>' : '') +
                            '</div></a>';
                    }).join('');
                })
                .catch(function() {
                    list.innerHTML = '<p class="room-ideas-empty">Could not load products.</p>';
                });
        })();

        // Pinterest board & Ideas (per room)
        (function() {
            const pinterestBlock = document.getElementById('pinterestBlock');
            if (!pinterestBlock) return;
            const roomSlug = {{ room_slug | tojson }};

            // Pinterest
            const pinterestLink = document.getElementById('pinterestLink');
            const pinterestLinkWrap = document.getElementById('pinterestLinkWrap');
            const pinterestBoardUrl = document.getElementById('pinterestBoardUrl');
            const pinterestSave = document.getElementById('pinterestSave');
            const pinterestMsg = document.getElementById('pinterestMsg');
            function loadPinterest() {
                fetch('/api/room-pinterest?room=' + encodeURIComponent(roomSlug))
                    .then(r => r.json())
                    .then(data => {
                        if (data.board_url) {
                            pinterestLink.href = data.board_url;
                            pinterestLinkWrap.style.display = 'block';
                            pinterestBoardUrl.value = data.board_url;
                        } else {
                            pinterestLinkWrap.style.display = 'none';
                        }
                    });
            }
            loadPinterest();
            pinterestSave.addEventListener('click', function() {
                const url = (pinterestBoardUrl.value || '').trim();
                if (!url) { pinterestMsg.textContent = 'Enter a board URL.'; return; }
                pinterestMsg.textContent = 'Saving...';
                fetch('/api/room-pinterest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ room: roomSlug, board_url: url })
                })
                    .then(r => r.json())
                    .then(() => { pinterestMsg.textContent = 'Saved.'; loadPinterest(); })
                    .catch(() => { pinterestMsg.textContent = 'Failed to save.'; });
            });

            // Ideas
            const ideaForm = document.getElementById('ideaForm');
            const ideasList = document.getElementById('ideasList');
            function loadIdeas() {
                fetch('/api/room-ideas?room=' + encodeURIComponent(roomSlug))
                    .then(r => r.json())
                    .then(ideas => {
                        if (!ideas || ideas.length === 0) {
                            ideasList.innerHTML = '<p class="room-ideas-empty">No ideas yet. Add one above.</p>';
                            return;
                        }
                        ideasList.innerHTML = ideas.map(idea => {
                            const ideaId = idea.id;
                            const ideaText = escapeHtml(idea.idea || '');
                            const imageUrl = escapeHtml((idea.image_url || '').trim());
                            const tags = Array.isArray(idea.tags) ? idea.tags : [];
                            const tagsStr = tags.join(', ');
                            const tagsHtml = tags.length ? '<div class="room-idea-card__tags">' + tags.map(t => '<span class="room-idea-card__tag">' + escapeHtml(t) + '</span>').join('') + '</div>' : '';
                            const imgUrl = (idea.image_url || '').trim();
                            const imgBlock = imgUrl
                                ? '<div class="room-idea-card__img-wrap"><a href="' + escapeHtml(imgUrl) + '" target="_blank" rel="noopener"><img src="' + escapeHtml(imgUrl) + '" alt="" onerror="this.parentElement.style.display=\'none\'"></a></div>'
                                : '';
                            
                            // Edit mode HTML (hidden by default)
                            const editHtml = '<div class="room-idea-card__edit" style="display: none;" data-id="' + ideaId + '">' +
                                '<textarea class="room-idea-card__edit-text" rows="3" placeholder="Idea text">' + ideaText + '</textarea>' +
                                '<input type="url" class="room-idea-card__edit-image" placeholder="Image URL (optional)" value="' + imageUrl + '">' +
                                '<input type="text" class="room-idea-card__edit-tags" placeholder="Tags (comma-separated)" value="' + escapeHtml(tagsStr) + '">' +
                                '<div class="room-idea-card__edit-actions">' +
                                '<button type="button" class="room-btn room-btn--small" onclick="saveRoomIdeaMwh(' + ideaId + ')">Save</button>' +
                                '<button type="button" class="room-btn room-btn--small room-btn--cancel" onclick="cancelEditRoomIdeaMwh(' + ideaId + ')">Cancel</button>' +
                                '</div></div>';
                            
                            // Display mode HTML
                            const displayHtml = '<div class="room-idea-card__display" data-id="' + ideaId + '">' +
                                '<div class="room-idea-card__body"><p class="room-idea-card__text">' + ideaText + '</p>' + tagsHtml + '</div>' +
                                '<div class="room-idea-card__actions">' +
                                '<button type="button" class="room-idea-card__edit-btn" data-id="' + ideaId + '" title="Edit idea" aria-label="Edit"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>' +
                                '<button type="button" class="room-idea-card__delete idea-delete" data-id="' + ideaId + '" title="Delete idea" aria-label="Delete"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>' +
                                '</div></div>';
                            
                            return '<div class="room-idea-card" data-id="' + ideaId + '">' + imgBlock + displayHtml + editHtml + '</div>';
                        }).join('');
                        
                        // Attach event listeners
                        ideasList.querySelectorAll('.idea-delete').forEach(btn => {
                            btn.addEventListener('click', function() {
                                const card = this.closest('.room-idea-card');
                                const id = card && card.dataset.id;
                                if (!id) return;
                                if (!confirm('Delete this idea?')) return;
                                fetch('/api/room-ideas/' + id, { method: 'DELETE' })
                                    .then(() => loadIdeas())
                                    .catch(() => alert('Failed to delete.'));
                            });
                        });
                        
                        ideasList.querySelectorAll('.room-idea-card__edit-btn').forEach(btn => {
                            btn.addEventListener('click', function() {
                                const id = btn.getAttribute('data-id');
                                editRoomIdeaMwh(id);
                            });
                        });
                    });
            }
            function escapeHtml(s) {
                const div = document.createElement('div');
                div.textContent = s;
                return div.innerHTML;
            }
            loadIdeas();
            ideaForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const idea = (document.getElementById('ideaText').value || '').trim();
                if (!idea) return;
                const imageUrl = (document.getElementById('ideaImageUrl').value || '').trim();
                const tagsStr = (document.getElementById('ideaTags').value || '').trim();
                const tags = tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(Boolean) : [];
                fetch('/api/room-ideas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ room: roomSlug, idea: idea, image_url: imageUrl || null, tags: tags, project: 'Muswell Hill' })
                })
                    .then(r => r.json())
                    .then(() => {
                        document.getElementById('ideaText').value = '';
                        document.getElementById('ideaImageUrl').value = '';
                        document.getElementById('ideaTags').value = '';
                        loadIdeas();
                    })
                    .catch(() => {});
            });
        })();

        // Edit room idea function (Muswell Hill)
        window.editRoomIdeaMwh = function(ideaId) {
            const ideasList = document.getElementById('ideasList');
            const card = ideasList.querySelector('.room-idea-card[data-id="' + ideaId + '"]');
            if (!card) return;
            const display = card.querySelector('.room-idea-card__display');
            const edit = card.querySelector('.room-idea-card__edit');
            if (display && edit) {
                display.style.display = 'none';
                edit.style.display = 'block';
                edit.querySelector('.room-idea-card__edit-text').focus();
            }
        };
        
        // Cancel edit function (Muswell Hill)
        window.cancelEditRoomIdeaMwh = function(ideaId) {
            const ideasList = document.getElementById('ideasList');
            const card = ideasList.querySelector('.room-idea-card[data-id="' + ideaId + '"]');
            if (!card) return;
            const display = card.querySelector('.room-idea-card__display');
            const edit = card.querySelector('.room-idea-card__edit');
            if (display && edit) {
                display.style.display = 'flex';
                edit.style.display = 'none';
                // Reload to reset form values
                loadIdeas();
            }
        };
        
        // Save room idea function (Muswell Hill)
        window.saveRoomIdeaMwh = function(ideaId) {
            const ideasList = document.getElementById('ideasList');
            const card = ideasList.querySelector('.room-idea-card[data-id="' + ideaId + '"]');
            if (!card) return;
            const edit = card.querySelector('.room-idea-card__edit');
            if (!edit) return;
            
            const ideaText = (edit.querySelector('.room-idea-card__edit-text').value || '').trim();
            const imageUrl = (edit.querySelector('.room-idea-card__edit-image').value || '').trim();
            const tagsStr = (edit.querySelector('.room-idea-card__edit-tags').value || '').trim();
            const tags = tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(Boolean) : [];
            
            if (!ideaText) {
                alert('Idea text is required');
                return;
            }
            
            const saveBtn = edit.querySelector('button[onclick*="saveRoomIdeaMwh"]');
            if (saveBtn) saveBtn.disabled = true;
            
            fetch('/api/room-ideas/' + ideaId, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    idea: ideaText, 
                    image_url: imageUrl || null, 
                    tags: tags,
                    project: 'Muswell Hill'
                })
            })
                .then(r => {
                    if (!r.ok) throw new Error('Failed to save');
                    return r.json();
                })
                .then(() => {
                    loadIdeas();
                })
                .catch(err => {
                    alert('Failed to save: ' + (err.message || 'Unknown error'));
                    if (saveBtn) saveBtn.disabled = false;
                });
        };

        // Make room section titles collapsible
        (function() {
            document.querySelectorAll('.room-section__title').forEach(function(title) {
                title.addEventListener('click', function() {
                    var section = title.closest('.room-section');
                    if (section) {
                        section.classList.toggle('collapsed');
                        title.classList.toggle('collapsed');
                    }
                });
            });
        })();
    </script>
</body>
</html>
